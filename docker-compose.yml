services:
  rabbit:
    image: rabbitmq:3.12-management
    hostname: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
    extends:
      file: common-config.yml
      service: network-deploy-service

  config-server:
    image: ${DOCKER_USERNAME}/config-server:${IMAGE_TAG}
    container_name: configserver-ms
    ports:
      - "8888:8888"
    depends_on:
      rabbit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8888/actuator/health/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      - MY_GITHUB_TOKEN=${MY_GITHUB_TOKEN}
    extends:
      file: common-config.yml
      service: microservice-base-config

  eureka-server:
    image: ${DOCKER_USERNAME}/eureka-server:${IMAGE_TAG}
    container_name: eurekaserver-ms
    ports:
      - "8761:8761"
    extends:
      file: common-config.yml
      service: network-deploy-service

networks:
  order-sphere-network:
    driver: bridge