spring:
  application:
    name: config-server
  profiles:
    active: git
  cloud:
    config:
      server:
        git:
          uri: https://github.com/rakshit-gobbi/order-sphere-config.git
          search-paths:
            - config-repo/default
            - config-repo/qa
            - config-repo/prod
          timeout: 5
          clone-on-start: true
          force-pull: true
          username: rakshit-gobbi
          password: ${MY_GITHUB_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info
    shutdown:
      enabled: true
  info:
    env:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: "config-server"
    description: "Centralized Config Server for Order Sphere Ecommerce Application"
    version: "1.0.0"
server:
  port: 8888